    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIU'S JUMP SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #000; /* 背景は黒 */
            color: #fff;
            overflow-x: hidden;
        }
        /* 集中線のような背景演出 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 80%),
                        repeating-conic-gradient(from 0deg, #111 0deg 10deg, #000 10deg 20deg);
            z-index: -1;
        }
        header {
            background-color: #ed1c24; /* ジャンプ公式っぽい赤 */
            padding: 30px;
            text-align: center;
            transform: skewY(-3deg); /* 斜めにして躍動感を出す */
            margin-top: -10px;
            box-shadow: 0 5px 0 #9e0b0f;
        }
        .logo {
            font-size: 40px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -2px;
            text-shadow: 4px 4px 0 #000;
            transform: skewY(3deg);
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 50px 20px;
        }
        .item-card {
            background: #fff;
            width: 250px;
            margin: 20px;
            padding: 10px;
            border: 5px solid #000;
            transform: rotate(-1deg); /* 少し傾ける */
            transition: 0.2s;
        }
        .item-card:hover {
            transform: scale(1.1) rotate(1deg);
            z-index: 10;
        }
        .item-image {
            width: 100%;
            height: 180px;
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            border-bottom: 5px solid #000;
        }
        .item-info {
            padding: 15px;
            color: #000;
        }
        .item-name {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 5px;
            border-left: 8px solid #ed1c24;
            padding-left: 10px;
        }
        .price {
            font-size: 24px;
            color: #ed1c24;
            font-weight: 900;
            font-style: italic;
        }
        .buy-btn {
            display: block;
            margin-top: 15px;
            padding: 12px;
            background-color: #000;
            color: #fff;
            text-align: center;
            text-decoration: none;
            font-weight: 900;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); /* 台形ボタン */
        }
        .buy-btn:hover {
            background-color: #ed1c24;
        }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5G9K7PFB"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<header>
    <div class="logo">Miu's Hero Archives</div>
</header>

<div class="container">
    <div class="item-card">
        <div class="item-image">🔥</div>
        <div class="item-info">
            <div class="item-name">灼熱の拳</div>
            <div class="price">MAX POWER</div>
            <a href="#" class="buy-btn">入手する</a>
        </div>
    </div>

    <div class="item-card">
        <div class="item-image">⚡</div>
        <div class="item-info">
            <div class="item-name">迅雷の剣</div>
            <div class="price">SPEED STAR</div>
            <a href="#" class="buy-btn">入手する</a>
        </div>
    </div>
</div>

</body>
