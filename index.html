<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miu's Kawaii Shop</title>
    <style>
        body {
            margin: 0;
            font-family: 'Hiragino Maru Gothic ProN', sans-serif;
            background-color: #e0f7fa; /* サンリオ風のパステルブルー */
            color: #555;
        }
        /* ヘッダー */
        header {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid #ffc1e3; /* ピンクのライン */
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ff85c0;
        }
        /* 商品一覧のコンテナ */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        /* 商品カード */
        .item-card {
            background: white;
            width: 200px;
            margin: 15px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px solid #fff;
            transition: transform 0.3s;
        }
        .item-card:hover {
            transform: translateY(-5px);
            border-color: #ffc1e3;
        }
        .item-image {
            width: 100%;
            height: 150px;
            background-color: #fff9fb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .item-info {
            padding: 15px;
            text-align: center;
        }
        .price {
            color: #ff85c0;
            font-weight: bold;
            font-size: 18px;
        }
        .buy-btn {
            display: block;
            margin-top: 10px;
            padding: 8px;
            background-color: #81d4fa;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">♡ Miu's Kawaii Shop ♡</div>
</header>

<div class="container">
    <div class="item-card">
        <div class="item-image">🧸</div>
        <div class="item-info">
            <div>ふわふわぬいぐるみ</div>
            <div class="price">¥1,200</div>
            <a href="#" class="buy-btn">詳細をみる</a>
        </div>
    </div>

    <div class="item-card">
        <div class="item-image">🎀</div>
        <div class="item-info">
            <div>キラキラリボン</div>
            <div class="price">¥500</div>
            <a href="#" class="buy-btn">詳細をみる</a>
        </div>
    </div>

    <div class="item-card">
        <div class="item-image">🌟</div>
        <div class="item-info">
            <div>星のステッカー</div>
            <div class="price">¥300</div>
            <a href="#" class="buy-btn">詳細をみる</a>
        </div>
    </div>
</div>

</body>
</html>
